<!DOCTYPE html>
<html lang="bn">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#FFFFFF" id="theme-color-meta">
<title>Myhisab</title>
<link rel="manifest" href="manifest.json">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Myhisab">
<link rel="apple-touch-icon" href="icon-192.png">
<link rel="icon" type="image/png" sizes="192x192" href="icon-192.png">
<link rel="icon" type="image/png" sizes="512x512" href="icon-512.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>
<body>

<!-- শুধু auth/pending screen-এ দেখা যায় -->
<button type="button" id="theme-toggle" class="theme-toggle" aria-label="Toggle dark mode">🌙</button>
<div class="brand" id="brand">Myhisab</div>
<div class="tagline" id="tagline">কথায় কথায় হিসাব</div>

<!-- অবস্থা ১: login/signup -->
<div id="auth-section" class="card">
  <form id="login-form">
    <label for="login-email">Email</label>
    <input type="email" id="login-email" autocomplete="email" required>
    <label for="login-password">Password</label>
    <input type="password" id="login-password" autocomplete="current-password" required>
    <div class="error-msg" id="login-error"></div>
    <button type="submit" class="btn-primary">লগইন করো</button>
    <button type="button" class="link-btn" id="show-signup-btn">নতুন? অ্যাকাউন্ট তৈরি করো</button>
  </form>
  <form id="signup-form" class="hidden">
    <label for="signup-name">তোমার নাম</label>
    <input type="text" id="signup-name" autocomplete="name" required>
    <label for="signup-email">Email</label>
    <input type="email" id="signup-email" autocomplete="email" required>
    <label for="signup-password">Password</label>
    <input type="password" id="signup-password" autocomplete="new-password" required minlength="6">
    <div class="hint">কমপক্ষে ৬ character</div>
    <div class="error-msg" id="signup-error"></div>
    <button type="submit" class="btn-primary">অ্যাকাউন্ট তৈরি করো</button>
    <button type="button" class="link-btn" id="show-login-btn">আগে থেকে account আছে? লগইন করো</button>
  </form>
</div>

<!-- অবস্থা ২: pending -->
<div id="pending-section" class="card hidden">
  <div class="pending-icon">⏳</div>
  <p class="pending-text">Account তৈরি হয়ে গেছে।<br>এখন admin approve করলেই ভেতরে ঢুকতে পারবে।</p>
  <button class="logout-btn" id="pending-logout-btn">লগআউট</button>
</div>

<!-- অবস্থা ৩: main app -->
<div id="app-section" class="app-wrap hidden">

  <!-- Top bar -->
  <div class="top-bar">
    <div class="top-bar-left">
      <span class="app-name-small">Myhisab</span>
    </div>
    <div class="segmented-toggle" id="ledger-toggle">
      <div class="segment-indicator" id="segment-indicator"></div>
      <button type="button" class="segment active" id="tab-personal">Personal</button>
      <button type="button" class="segment" id="tab-business">Business</button>
    </div>
    <button type="button" id="settings-btn" class="top-settings-btn" aria-label="Settings">⚙️</button>
  </div>
  <!-- View tab bar — inline, no bottom nav -->
  <div class="view-tab-bar">
    <button type="button" class="view-tab-btn active" data-view="home">হোম</button>
    <button type="button" class="view-tab-btn" data-view="history">ইতিহাস</button>
  </div>

  <!-- View: Home (Dashboard + Feed) -->
  <div class="view-panel" id="view-home">

    <!-- Premium Dashboard -->
    <div class="dashboard-wrap">
      <!-- Balance hero -->
      <div class="balance-hero">
        <div class="balance-label">বর্তমান ব্যালেন্স</div>
        <div class="balance-amount" id="stat-balance">৳0</div>
        <div class="balance-sub" id="stat-month-label">জুলাই ২০২৬</div>
      </div>
      <!-- 2-col stat row -->
      <div class="stat-row">
        <div class="stat-pill income-pill">
          <div class="stat-pill-icon">↑</div>
          <div class="stat-pill-body">
            <div class="stat-pill-label">আয়</div>
            <div class="stat-pill-val" id="stat-income">৳0</div>
          </div>
        </div>
        <div class="stat-pill expense-pill">
          <div class="stat-pill-icon">↓</div>
          <div class="stat-pill-body">
            <div class="stat-pill-label">খরচ</div>
            <div class="stat-pill-val" id="stat-expense">৳0</div>
          </div>
        </div>
      </div>
      <!-- Sparkline bar chart -->
      <div class="sparkline-wrap">
        <div class="sparkline-title">শেষ ৭ দিনের খরচ</div>
        <div class="sparkline-chart" id="sparkline-chart"></div>
        <div class="sparkline-labels" id="sparkline-labels"></div>
      </div>
    </div>

    <!-- Recent entries header -->
    <div class="section-header">
      <span class="section-title">সাম্প্রতিক</span>
    </div>
    <div class="chat-feed" id="chat-feed"></div>
  </div>

  <!-- View: History -->
  <div class="view-panel hidden" id="view-history">
    <!-- Filter tabs -->
    <div class="history-filter-bar">
      <button type="button" class="hf-btn active" data-hfilter="day">দিন</button>
      <button type="button" class="hf-btn" data-hfilter="month">মাস</button>
      <button type="button" class="hf-btn" data-hfilter="year">বছর</button>
    </div>
    <!-- Period navigator -->
    <div class="period-nav">
      <button type="button" class="period-arrow" id="period-prev">‹</button>
      <span class="period-label" id="period-label">—</span>
      <button type="button" class="period-arrow" id="period-next">›</button>
    </div>
    <!-- Summary bar -->
    <div class="history-summary" id="history-summary">
      <div class="hs-pill green"><span id="hs-income">৳0</span><span class="hs-lbl">আয়</span></div>
      <div class="hs-pill red"><span id="hs-expense">৳0</span><span class="hs-lbl">খরচ</span></div>
      <div class="hs-pill gold"><span id="hs-net">৳0</span><span class="hs-lbl">নেট</span></div>
    </div>
    <!-- Trend chart -->
    <div class="trend-wrap" id="trend-wrap">
      <svg class="trend-svg" id="trend-svg" viewBox="0 0 320 80" preserveAspectRatio="none"></svg>
      <div class="trend-x-labels" id="trend-x-labels"></div>
    </div>
    <!-- History list -->
    <div class="history-list" id="history-list"></div>
  </div>

  <!-- Chat input bar — always fixed at bottom -->
  <form id="chat-form" class="chat-input-bar">
    <input type="text" id="chat-input" placeholder="যেমন: ৫০ টাকার চা খেয়েছি" autocomplete="off" required>
    <button type="submit" class="send-btn" id="chat-send-btn" aria-label="Send">➤</button>
  </form>

  <!-- Settings bottom sheet -->
  <div class="settings-overlay hidden" id="settings-overlay">
    <div class="settings-card">
      <div class="settings-user">
        <span class="who" id="who-name"></span>
        <span class="role-badge" id="who-role"></span>
      </div>
      <button type="button" class="settings-row" id="theme-toggle-row">
        <span>থিম</span>
        <span id="theme-toggle-label">🌙 Dark Mode</span>
      </button>
      <div class="admin-panel hidden" id="admin-panel">
        <div class="admin-panel-title">Pending Approvals</div>
        <div id="pending-list"></div>
      </div>
      <button type="button" class="logout-btn" id="app-logout-btn">লগআউট</button>
    </div>
  </div>

  <!-- Confirm card -->
  <div class="confirm-overlay hidden" id="confirm-overlay">
    <div class="confirm-card">
      <div class="confirm-title">যাচাই করো</div>
      <label for="confirm-amount">Amount (৳)</label>
      <input type="number" id="confirm-amount" min="0" step="0.01">
      <label>Type</label>
      <div class="confirm-type-toggle">
        <button type="button" class="type-btn type-expense active" id="confirm-type-expense">Expense</button>
        <button type="button" class="type-btn type-income" id="confirm-type-income">Income</button>
      </div>
      <label for="confirm-category">Category</label>
      <select id="confirm-category"></select>
      <label for="confirm-date">Date</label>
      <input type="date" id="confirm-date">
      <label for="confirm-note">Note</label>
      <input type="text" id="confirm-note">
      <div class="confirm-actions">
        <button type="button" class="btn-secondary" id="confirm-cancel-btn">বাতিল</button>
        <button type="button" class="btn-primary" id="confirm-save-btn">সংরক্ষণ করো</button>
      </div>
    </div>
  </div>

</div>

<script type="module" src="app.js"></script>
<script>
  if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => {
      navigator.serviceWorker.register('/sw.js').catch(() => {});
    });
  }
</script>
</body>
</html>
